name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build-test-demo:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Demo generation check
        run: |
          make demo
          test -f samples/generated/pm-2026-03-11-payment-api/prometheus-rules.yaml
          test -f samples/generated/pm-2026-03-11-payment-api/traceability.json
          # bundle-summary.json embeds which validators ran (promtool vs static
          # fallback etc.), which varies by environment - exclude it from the
          # determinism check; all artifact files must be byte-identical.
          git diff --exit-code -- samples/generated ':(exclude)samples/generated/pm-2026-03-11-payment-api/bundle-summary.json'
